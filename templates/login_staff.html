<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - ESSEN</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #00D9FF;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            width: 95%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #00D9FF;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            opacity: 0.9;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .link a {
            color: #FF6B35;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>ESSEN STAFF</h1>
        <p>Kitchen / Owner / Manager</p>
        <form id="loginForm">
            <input type="text" id="email" placeholder="Email or Staff ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">ACCESS DASHBOARD</button>
        </form>
        <div class="link">
            <a href="/login/customer">Customer Login</a>
        </div>
        <p id="error" style="color: red; display: none; margin-top: 10px;"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            try {
                const res = await fetch('/api/auth/login/staff', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: email, password: password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.user.role === 'owner') window.location.href = '/owner/dashboard';
                    else if (data.user.role === 'kitchen') window.location.href = '/kitchen/dashboard';
                    else window.location.href = '/dashboard/staff';
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Login failed';
                error.style.display = 'block';
            }
        });
    </script>
</body>

</html>
