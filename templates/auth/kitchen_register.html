{% extends 'base.html' %}
{% block title %}Kitchen Register{% endblock %}
{% block content %}
<div class="card" style="max-width:620px;margin:30px auto;">
  <h2 class="section-title">🍳 Kitchen Register</h2>
  <div id="regAlert" style="margin:10px 0;color:#b91c1c;font-weight:700;"></div>
  <div style="display:grid;gap:12px;grid-template-columns:1fr 1fr;">
    <div style="grid-column:1/3"><label>Full Name</label><input id="name" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;"></div>
    <div><label>Email</label><input id="email" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;"></div>
    <div><label>Phone</label><input id="phone" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;"></div>
    <div><label>Staff ID</label><input id="college_id" placeholder="e.g., KITCHEN123" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;"></div>
    <div><label>Password</label><input id="password" type="password" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;"></div>
  </div>
  <div style="margin-top:14px;display:flex;gap:10px;">
    <button class="btn" onclick="doRegister()">Create Account</button>
    <a class="btn ghost" href="/login/kitchen">Back to Login</a>
  </div>
</div>
<script>
async function doRegister(){
  const data = {
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    college_id: (document.getElementById('college_id').value.trim() || 'kitchen'+Date.now()),
    password: document.getElementById('password').value
  };
  try{
    const r = await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const j = await r.json(); if(!r.ok) throw new Error(j.error||'Signup failed');
    localStorage.setItem('authToken', j.token); localStorage.setItem('currentUser', JSON.stringify(j.user));
    window.location.href = '/kitchen/dashboard';
  }catch(e){ document.getElementById('regAlert').textContent = e.message; }
}
</script>
{% endblock %}
