{% extends 'base.html' %}
{% block title %}Customer Login{% endblock %}
{% block content %}
<style>
.login-container {
  max-width: 480px;
  margin: 60px auto;
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
.login-header {
  text-align: center;
  margin-bottom: 35px;
}
.login-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5em;
  margin: 0 auto 20px;
  color: white;
}
.login-title {
  font-size: 1.8em;
  font-weight: 700;
  color: #2C3E50;
  margin-bottom: 8px;
}
.login-subtitle {
  color: #6b7280;
  font-size: 0.95em;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-weight: 600;
  color: #2C3E50;
  margin-bottom: 8px;
  font-size: 0.95em;
}
.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #d3ece8;
  border-radius: 12px;
  font-size: 1em;
  transition: all 0.3s;
  box-sizing: border-box;
}
.form-input:focus {
  outline: none;
  border-color: #FF6B6B;
  box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
}
.btn-login {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 1.05em;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 10px;
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
}
.btn-login:active {
  transform: translateY(0);
}
.alert-error {
  background: #FEE2E2;
  color: #991B1B;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-weight: 600;
  border-left: 4px solid #EF4444;
}
.divider {
  text-align: center;
  margin: 25px 0;
  color: #9CA3AF;
  font-size: 0.9em;
}
.link-text {
  text-align: center;
  color: #6b7280;
  font-size: 0.95em;
  margin-top: 20px;
}
.link-text a {
  color: #FF6B6B;
  font-weight: 600;
  text-decoration: none;
  transition: color 0.3s;
}
.link-text a:hover {
  color: #EE5A6F;
}
</style>

<div class="login-container">
  <div class="login-header">
    <div class="login-icon">👤</div>
    <h2 class="login-title">Welcome Back!</h2>
    <p class="login-subtitle">Sign in to your customer account</p>
  </div>

  <div id="loginAlert" style="display:none"></div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Email or College ID</label>
      <input id="email" type="text" class="form-input" placeholder="Enter your email or ID" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" class="form-input" placeholder="Enter your password" required>
    </div>
