<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - ESSEN</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #030303;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #FF6B35;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            width: 95%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            opacity: 0.9;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .link a {
            color: #00D9FF;
            text-decoration: none;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 0;
            /* Override generic button margin */
        }

        .tab.active {
            background: #FF6B35;
            color: white;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>ESSEN</h1>
        <div class="tabs">
            <button id="loginTab" class="tab active" onclick="switchTab('login')">Login</button>
            <button id="signupTab" class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <input type="tel" id="loginPhone" placeholder="Phone Number" required autocomplete="tel">
            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
            <button type="submit">LOGIN</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display: none;">
            <input type="text" id="signupName" placeholder="Full Name" required autocomplete="name">
            <input type="email" id="signupEmail" placeholder="Email Address" required autocomplete="email">
            <input type="tel" id="signupPhone" placeholder="Phone Number" required autocomplete="tel">
            <input type="password" id="signupPassword" placeholder="Create Password" required
                autocomplete="new-password">

            <div id="otpSection" style="display: none;">
                <input type="text" id="otpInput" placeholder="Enter OTP (sent to console)" maxlength="6">
            </div>

            <button type="button" id="otpBtn" onclick="sendOtp()">Send OTP</button>
            <button type="submit" id="signupBtn" style="display: none;">CREATE ACCOUNT</button>
        </form>

        <div class="link">
            <a href="/login/staff">Staff Login</a>
        </div>
        <p id="error" style="color: red; display: none; margin-top: 10px;"></p>
        <p id="success" style="color: #00ff88; display: none; margin-top: 10px;"></p>
    </div>

    <script>
        // Tab Switching
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const error = document.getElementById('error');
            const success = document.getElementById('success');

            error.style.display = 'none';
            success.style.display = 'none';

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
            }
        }

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;
            const error = document.getElementById('error');

            error.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login/customer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: phone, password: password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/customer/dashboard';
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Login failed';
                error.style.display = 'block';
            }
        });

        // Signup Logic - Send OTP
        async function sendOtp() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('signupPhone').value;
            const password = document.getElementById('signupPassword').value;
            const error = document.getElementById('error');
            const success = document.getElementById('success');
            const otpBtn = document.getElementById('otpBtn');
            const signupBtn = document.getElementById('signupBtn');
            const otpSection = document.getElementById('otpSection');

            if (!name || !phone || !password || !email) {
                error.textContent = 'Please fill all fields first';
                error.style.display = 'block';
                return;
            }

            error.style.display = 'none';
            otpBtn.disabled = true;
            otpBtn.textContent = 'Sending...';

            try {
                // Generate OTP (using phone as identifier)
                // Note: We send name/email just for logging if needed, or primarily phone
                const res = await fetch('/api/auth/generate-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, name: name, email: email })
                });

                const data = await res.json();
                if (res.ok) {
                    success.textContent = 'OTP Sent! Check server console';
                    success.style.display = 'block';
                    otpSection.style.display = 'block';
                    otpBtn.style.display = 'none';
                    signupBtn.style.display = 'block';
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                    otpBtn.disabled = false;
                    otpBtn.textContent = 'Send OTP';
                }
            } catch (err) {
                error.textContent = 'Failed to send OTP';
                error.style.display = 'block';
                otpBtn.disabled = false;
                otpBtn.textContent = 'Send OTP';
            }
        }

        // Signup Logic - Complete Registration
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('signupPhone').value;
            const password = document.getElementById('signupPassword').value;
            const otp = document.getElementById('otpInput').value;
            const error = document.getElementById('error');

            if (!otp) {
                error.textContent = 'Please enter OTP';
                error.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        phone: phone,
                        email: email,
                        password: password,
                        otp: otp,
                        role: 'customer'
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    // Auto Login after signup
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/customer/dashboard';
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Signup failed';
                error.style.display = 'block';
            }
        });
    </script>
</body>

</html>
