{% extends 'base_customer.html' %}
{% block title %}Order History{% endblock %}
{% block content %}
<div class="card">
    <h2 class="section-title">📊 Order History</h2>
    <div id="historyRoot">Loading...</div>
</div>
<script>
(async function(){
  const token = localStorage.getItem('authToken') || '';
  try {
    const res = await fetch('/api/orders/history', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
    const data = await res.json();
    const root = document.getElementById('historyRoot');
    if (!Array.isArray(data) || data.length === 0) { root.textContent = 'No past orders.'; return; }
    function badgeCls(s){ s=(s||'').toLowerCase(); if(s==='pending') return 'badge pending'; if(s==='accepted') return 'badge accepted'; if(s==='preparing') return 'badge preparing'; if(s==='ready') return 'badge ready'; if(s==='delivered') return 'badge delivered'; return 'badge'; }
    root.innerHTML = data.map(o => `
      <div style=\"border-bottom:1px solid #eee;padding:10px 0;\">
        <div style=\"display:flex;justify-content:space-between;align-items:center;\">
          <strong>#${o.id}</strong>
          <span class=\"${badgeCls(o.status)}\">${o.status.toUpperCase()}</span>
        </div>
        <div style=\"color:#777;margin-top:6px;\">${new Date(o.timestamp).toLocaleString()}</div>
        <div>${(o.items||[]).map(i=>`${i.icon||''} ${i.name} x${i.quantity}`).join('<br>')}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('historyRoot').textContent = 'Failed to load history.';
  }
})();
</script>
{% endblock %}
