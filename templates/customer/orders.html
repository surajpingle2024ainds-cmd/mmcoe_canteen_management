{% extends 'base_customer.html' %}
{% block title %}My Orders{% endblock %}
{% block content %}
<div class="card">
    <h2 class="section-title">📦 My Orders</h2>
    <div id="ordersRoot">Loading...</div>
</div>
<script>
(async function(){
  const token = localStorage.getItem('authToken') || '';
  try {
    const res = await fetch('/api/orders/my-orders', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
    const root = document.getElementById('ordersRoot');
    if (!res.ok) {
      const error = await res.json().catch(() => ({error: 'Failed to load orders'}));
      root.innerHTML = `<div style="color:#ef4444;padding:20px;text-align:center;">❌ ${error.error || 'Failed to load orders'}</div>`;
      return;
    }
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) { root.textContent = 'No active orders.'; return; }
    function badgeCls(s){ s=(s||'').toLowerCase(); if(s==='pending') return 'badge pending'; if(s==='accepted') return 'badge accepted'; if(s==='preparing') return 'badge preparing'; if(s==='ready') return 'badge ready'; if(s==='delivered') return 'badge delivered'; return 'badge'; }
    root.innerHTML = data.map(o => `
      <div style=\"border:2px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px;background:#f8fafc;\">
        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;\">
          <strong style=\"font-size:1.1em;\">#${o.order_id || o.id}</strong>
          <span class=\"${badgeCls(o.status)}\">${o.status.toUpperCase()}</span>
        </div>
        <div style=\"color:#64748b;margin-bottom:12px;\">${o.timestamp || o.created_at ? new Date(o.timestamp || o.created_at).toLocaleString() : 'N/A'}</div>
        <div style=\"margin-bottom:12px;\">${(o.items||[]).map(i=>`<div style=\"padding:6px 0;\">${i.icon||''} <strong>${i.name}</strong> x${i.quantity} - ₹${i.price * i.quantity}</div>`).join('')}</div>
        <div style=\"font-weight:700;margin-bottom:12px;color:#ef4444;\">Total: ₹${o.total}</div>
      </div>
    `).join('');
    
    // Real-time status updates - auto-refresh every 5 seconds
    setInterval(async function(){
      try{
        const res = await fetch('/api/orders/my-orders', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
        const data = await res.json();
        const root = document.getElementById('ordersRoot');
        if(Array.isArray(data)){
          if(data.length === 0) {
            root.textContent = 'No active orders.';
            return;
          }
          // Re-render orders to show latest status and new orders
          root.innerHTML = data.map(o => `
            <div style="border:2px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px;background:#f8fafc;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <strong style="font-size:1.1em;">#${o.order_id || o.id}</strong>
                <span class="${badgeCls(o.status)}">${o.status.toUpperCase()}</span>
              </div>
              <div style="color:#64748b;margin-bottom:12px;">${o.timestamp || o.created_at ? new Date(o.timestamp || o.created_at).toLocaleString() : 'N/A'}</div>
              <div style="margin-bottom:12px;">${(o.items||[]).map(i=>`<div style="padding:6px 0;">${i.icon||''} <strong>${i.name}</strong> x${i.quantity} - ₹${i.price * i.quantity}</div>`).join('')}</div>
              <div style="font-weight:700;margin-bottom:12px;color:#ef4444;">Total: ₹${o.total}</div>
            </div>
          `).join('');
        }
      }catch(e){
        console.error('Error refreshing orders:', e);
      }
    }, 5000); // Update every 5 seconds
  } catch(e) {
    document.getElementById('ordersRoot').textContent = 'Failed to load orders.';
  }
})();
</script>
{% endblock %}
