<div id="userMenu" style="position:relative;display:none">
    <button id="userMenuBtn" style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.25);color:#e5e7eb;padding:0;border-radius:999px;cursor:pointer;font-weight:700">
        <img id="userAvatarImg" alt="avatar" style="width:40px;height:40px;border-radius:999px;object-fit:cover;display:none" />
        <span id="userAvatar" style="background:#22c55e;color:#0b1020;width:40px;height:40px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:16px">U</span>
    </button>
    <div id="userDropdown" style="display:none;position:absolute;right:0;top:48px;background:#111827;color:#e5e7eb;border:1px solid #1f2937;border-radius:10px;min-width:220px;box-shadow:0 10px 24px rgba(0,0,0,.35);z-index:10001">
        <div style="padding:12px 14px;border-bottom:1px solid #1f2937;max-width:100%">
            <div id="dropdownUserName" style="font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px">User</div>
            <div id="dropdownUserEmail" style="opacity:.8;font-size:.85em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
        </div>
        <a href="/logout" class="logout-btn" style="padding:10px 14px;text-decoration:none;color:#ef4444;display:block;border-top:1px solid #1f2937">Logout</a>
    </div>
</div>
