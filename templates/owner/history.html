{% extends 'base_owner.html' %}
{% block title %}Order History{% endblock %}
{% block content %}
<div class="card">
    <h2 class="section-title">📊 Order History</h2>
    <div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
        <select id="statusFilter" onchange="loadHistory()" style="padding:8px;border-radius:8px;border:1px solid #ddd;">
            <option value="">All Orders</option>
            <option value="delivered">Delivered</option>
            <option value="ready">Ready</option>
            <option value="preparing">Preparing</option>
            <option value="accepted">Accepted</option>
            <option value="pending">Pending</option>
            <option value="rejected">Rejected</option>
        </select>
        <input type="date" id="dateFilter" onchange="loadHistory()" style="padding:8px;border-radius:8px;border:1px solid #ddd;">
        <select id="paymentFilter" onchange="loadHistory()" style="padding:8px;border-radius:8px;border:1px solid #ddd;">
            <option value="">All Payment Types</option>
            <option value="PAID">Online Paid</option>
            <option value="CASH">Cash</option>
            <option value="PENDING">Pending Payment</option>
        </select>
        <button onclick="loadHistory()" class="btn" style="padding:8px 16px;">Refresh</button>
    </div>
    <div id="historyRoot">Loading...</div>
</div>
<script>
(function(){
  const token = localStorage.getItem('authToken') || '';
  
  function badgeCls(s){
    s = (s || '').toLowerCase();
    if(s === 'pending') return 'badge pending';
    if(s === 'accepted') return 'badge accepted';
    if(s === 'preparing') return 'badge preparing';
    if(s === 'ready') return 'badge ready';
    if(s === 'delivered') return 'badge delivered';
    if(s === 'rejected') return 'badge rejected';
    return 'badge';
  }
  
  function paymentBadgeCls(ps){
    ps = (ps || '').toUpperCase();
    if(ps === 'PAID') return 'badge success';
    if(ps === 'CASH') return 'badge info';
    return 'badge pending';
  }
  
  async function loadHistory(){
    const root = document.getElementById('historyRoot');
    if(!root) return;
    
    try {
      root.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Loading history...</div>';
      
      const statusFilter = document.getElementById('statusFilter').value;
      const dateFilter = document.getElementById('dateFilter').value;
      const paymentFilter = document.getElementById('paymentFilter').value;
      
      let url = '/api/owner/orders/history';
      const params = [];
      if(statusFilter) params.push('status=' + encodeURIComponent(statusFilter));
      if(dateFilter) params.push('date=' + encodeURIComponent(dateFilter));
      if(paymentFilter) params.push('payment=' + encodeURIComponent(paymentFilter));
      if(params.length) url += '?' + params.join('&');
      
      if(!token){
        root.innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center;">❌ Not logged in. Please <a href="/">login</a> first.</div>';
        return;
      }
      
      const res = await fetch(url, { 
        headers: { 
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        } 
      });
      
      if(!res.ok){
        const error = await res.json().catch(() => ({error: 'Failed to load history'}));
        let errorMsg = error.error || 'Failed to load history';
        
        if(res.status === 401 || res.status === 403){
          errorMsg = 'Unauthorized. Please logout and login again as owner.';
          root.innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center;">❌ ' + errorMsg + '<br><a href="/" class="btn" style="margin-top:12px;display:inline-block;">Go to Login</a></div>';
        } else {
          root.innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center;">❌ Error: ' + errorMsg + '<br><button onclick="loadHistory()" class="btn" style="margin-top:12px;">Retry</button></div>';
        }
        return;
      }
      
      const data = await res.json();
      
      if (!data || !Array.isArray(data) || data.length === 0) { 
        root.innerHTML = '<div style="padding:40px;text-align:center;color:#64748b;">📭 No orders found.</div>'; 
        return; 
      }
      
      // Calculate totals
      const totalRevenue = data.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);
      const totalOrders = data.length;
      
      root.innerHTML = `
        <div style="margin-bottom:16px;padding:12px;background:#f0f9ff;border-radius:8px;display:flex;gap:24px;flex-wrap:wrap;">
          <div><strong>Total Orders:</strong> ${totalOrders}</div>
          <div><strong>Total Revenue:</strong> ₹${totalRevenue.toFixed(2)}</div>
          <div><strong>Avg. Order Value:</strong> ₹${(totalRevenue / totalOrders || 0).toFixed(2)}</div>
        </div>
        ${data.map(o => `
          <div style="border-bottom:1px solid #eee;padding:12px 0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <div>
                <strong>#${o.id || o.order_id}</strong>
                <span style="color:#777;margin-left:12px;">${o.customer_name || 'Customer'}</span>
                ${o.is_vip ? '<span class="badge accepted" style="margin-left:8px;">VIP</span>' : ''}
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <span class="${badgeCls(o.status)}">${(o.status || '').toUpperCase()}</span>
                ${o.payment_status ? `<span class="${paymentBadgeCls(o.payment_status)}">${o.payment_status}</span>` : ''}
              </div>
            </div>
            <div style="color:#777;margin-top:6px;font-size:0.9em;">
              ${o.timestamp || o.created_at ? new Date(o.timestamp || o.created_at).toLocaleString() : 'Unknown date'}
              ${o.total ? ' • ₹' + parseFloat(o.total || 0).toFixed(2) : ''}
              ${o.transaction_id && o.transaction_id !== 'CASH' && o.transaction_id !== 'PENDING' ? ' • Txn: ' + o.transaction_id : ''}
            </div>
            <div style="margin-top:8px;">
              ${(o.items || []).map(i => `${i.icon || ''} ${i.name} x${i.quantity} (₹${(parseFloat(i.price) || 0) * (i.quantity || 1)})`).join(', ')}
            </div>
            ${o.kitchen_notes ? `<div style="margin-top:6px;padding:6px;background:#fff3cd;border-radius:4px;font-size:0.85em;"><strong>Note:</strong> ${o.kitchen_notes}</div>` : ''}
          </div>
        `).join('')}
      `;
    } catch(e) {
      console.error('History load error:', e);
      const root = document.getElementById('historyRoot');
      if(root){
        root.innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center;">❌ Failed to load history: ' + (e.message || 'Unknown error') + '<br><button onclick="loadHistory()" class="btn" style="margin-top:12px;">Retry</button></div>';
      }
    }
  }
  
  // Set today's date as default (optional - can be left empty for all orders)
  const dateFilterEl = document.getElementById('dateFilter');
  if(dateFilterEl){
    // Don't set default date - let user choose or view all orders
  }
  
  // Load on page load
  loadHistory();
  
  // Auto-refresh every 60 seconds
  setInterval(loadHistory, 60000);
  
  // Expose function globally for retry button
  window.loadHistory = loadHistory;
})();
</script>
{% endblock %}
