{% extends 'base_owner.html' %}
{% block title %}Manage Offers{% endblock %}
{% block content %}
<div class="card">
    <h2 class="section-title">🎁 Manage Offers & Discounts</h2>
    <div style="margin-bottom:20px">
        <button class="btn" onclick="showCreateOfferForm()">➕ Create New Offer</button>
    </div>
    <div id="offersList">Loading...</div>
</div>

<!-- Create/Edit Offer Modal -->
<div id="offerModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center">
    <div style="background:#fff;padding:30px;border-radius:16px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto">
        <h3 style="margin-bottom:20px">Create Offer</h3>
        <div style="display:flex;flex-direction:column;gap:16px">
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Offer Name *</label>
                <input type="text" id="offerName" placeholder="e.g., Weekend Special" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Description</label>
                <textarea id="offerDescription" placeholder="Optional description" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;min-height:80px"></textarea>
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Discount % *</label>
                <input type="number" id="offerDiscount" placeholder="e.g., 20 for 20% off" min="1" max="100" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Start Date</label>
                <input type="datetime-local" id="offerStartDate" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">End Date (Optional - leave empty for no expiry)</label>
                <input type="datetime-local" id="offerEndDate" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div style="display:flex;gap:12px">
                <button class="btn" onclick="saveOffer()" style="flex:1">Save</button>
                <button class="btn ghost" onclick="closeOfferModal()" style="flex:1">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
(async function(){
  const token = localStorage.getItem('authToken') || '';
  let editingOfferId = null;
  
  async function loadOffers(){
    try{
      const res = await fetch('/api/owner/offers', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
      const offers = await res.json();
      const root = document.getElementById('offersList');
      
      if(!Array.isArray(offers) || !offers.length){
        root.innerHTML = '<div class="muted">No offers created yet.</div>';
        return;
      }
      
      root.innerHTML = offers.map(function(o){
        const isActive = o.is_active;
        const startDate = o.start_date ? new Date(o.start_date).toLocaleString() : '—';
        const endDate = o.end_date ? new Date(o.end_date).toLocaleString() : 'No expiry';
        
        return `
          <div style="border:2px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;background:${isActive ? '#f0fdf4' : '#f8fafc'}">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
              <div>
                <h3 style="margin:0;color:#111827">${o.name} ${isActive ? '<span style="background:#22c55e;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;margin-left:8px">ACTIVE</span>' : ''}</h3>
                <div style="color:#64748b;margin-top:4px">${o.description || 'No description'}</div>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn" style="padding:6px 12px;font-size:14px" onclick="editOffer(${o.id})">Edit</button>
                <button class="btn" style="padding:6px 12px;font-size:14px;background:${isActive ? '#ef4444' : '#22c55e'}" onclick="toggleOffer(${o.id}, ${!isActive})">${isActive ? 'Deactivate' : 'Activate'}</button>
                <button class="btn" style="padding:6px 12px;font-size:14px;background:#ef4444" onclick="deleteOffer(${o.id})">Delete</button>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:12px">
              <div><strong>Discount:</strong> ${o.discount_percent}%</div>
              <div><strong>Start:</strong> ${startDate}</div>
              <div><strong>End:</strong> ${endDate}</div>
            </div>
          </div>
        `;
      }).join('');
    }catch(e){
      document.getElementById('offersList').textContent = 'Failed to load offers.';
      console.error(e);
    }
  }
  
  window.showCreateOfferForm = function(){
    editingOfferId = null;
    document.getElementById('offerName').value = '';
    document.getElementById('offerDescription').value = '';
    document.getElementById('offerDiscount').value = '';
    document.getElementById('offerStartDate').value = '';
    document.getElementById('offerEndDate').value = '';
    document.getElementById('offerModal').style.display = 'flex';
  };
  
  window.closeOfferModal = function(){
    document.getElementById('offerModal').style.display = 'none';
  };
  
  window.saveOffer = async function(){
    const name = document.getElementById('offerName').value.trim();
    const discount = parseFloat(document.getElementById('offerDiscount').value);
    const description = document.getElementById('offerDescription').value.trim();
    const startDate = document.getElementById('offerStartDate').value;
    const endDate = document.getElementById('offerEndDate').value;
    
    if(!name || !discount || discount <= 0){
      alert('Please fill in offer name and discount %');
      return;
    }
    
    try{
      const data = {
        name: name,
        discount_percent: discount,
        description: description,
        start_date: startDate ? new Date(startDate).toISOString() : null,
        end_date: endDate ? new Date(endDate).toISOString() : null
      };
      
      let res;
      if(editingOfferId){
        res = await fetch('/api/owner/offers/' + editingOfferId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
          body: JSON.stringify(data)
        });
      } else {
        res = await fetch('/api/owner/offers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
          body: JSON.stringify(data)
        });
      }
      
      if(res.ok){
        closeOfferModal();
        loadOffers();
        alert('Offer saved successfully!');
      } else {
        const err = await res.json();
        alert('Error: ' + (err.error || 'Failed to save'));
      }
    }catch(e){
      alert('Error saving offer: ' + e.message);
    }
  };
  
  window.editOffer = async function(id){
    editingOfferId = id;
    try{
      const res = await fetch('/api/owner/offers', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
      const offers = await res.json();
      const offer = offers.find(function(o){ return o.id === id; });
      
      if(offer){
        document.getElementById('offerName').value = offer.name;
        document.getElementById('offerDescription').value = offer.description || '';
        document.getElementById('offerDiscount').value = offer.discount_percent;
        if(offer.start_date){
          const start = new Date(offer.start_date);
          document.getElementById('offerStartDate').value = start.toISOString().slice(0,16);
        }
        if(offer.end_date){
          const end = new Date(offer.end_date);
          document.getElementById('offerEndDate').value = end.toISOString().slice(0,16);
        }
        document.getElementById('offerModal').style.display = 'flex';
      }
    }catch(e){
      alert('Error loading offer: ' + e.message);
    }
  };
  
  window.toggleOffer = async function(id, activate){
    try{
      const res = await fetch('/api/owner/offers/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
        body: JSON.stringify({ is_active: activate })
      });
      
      if(res.ok){
        loadOffers();
      } else {
        alert('Failed to update offer');
      }
    }catch(e){
      alert('Error: ' + e.message);
    }
  };
  
  window.deleteOffer = async function(id){
    if(!confirm('Are you sure you want to delete this offer?')) return;
    
    try{
      const res = await fetch('/api/owner/offers/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': token ? 'Bearer ' + token : '' }
      });
      
      if(res.ok){
        loadOffers();
      } else {
        alert('Failed to delete offer');
      }
    }catch(e){
      alert('Error: ' + e.message);
    }
  };
  
  loadOffers();
})();
</script>
{% endblock %}
