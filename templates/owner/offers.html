{% extends 'base_owner.html' %}
{% block title %}Manage Offers{% endblock %}
{% block content %}
<div class="card">
    <h2 class="section-title">🎁 Manage Offers &amp; Discounts</h2>
    <div style="margin-bottom:20px">
        <button class="btn" onclick="showCreateOfferForm()">➕ Create New Offer</button>
    </div>
    <div id="offersList">Loading...</div>
</div>

<!-- Create/Edit Offer Modal -->
<div id="offerModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center">
    <div style="background:#fff;padding:30px;border-radius:16px;max-width:520px;width:90%;max-height:90vh;overflow-y:auto">
        <h3 id="offerModalTitle" style="margin-bottom:20px">Create Offer</h3>
        <div style="display:flex;flex-direction:column;gap:16px">

            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Offer Title *</label>
                <input type="text" id="offerTitle" placeholder="e.g., Weekend Special"
                    style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;box-sizing:border-box" />
            </div>

            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Subtitle / Description</label>
                <textarea id="offerSubtitle" placeholder="e.g., Flat 20% off on all items this weekend!"
                    style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;min-height:70px;box-sizing:border-box"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <label style="display:block;margin-bottom:6px;font-weight:700">Emoji</label>
                    <input type="text" id="offerEmoji" value="🎉" maxlength="4"
                        style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;font-size:20px;text-align:center;box-sizing:border-box" />
                </div>
                <div>
                    <label style="display:block;margin-bottom:6px;font-weight:700">Card Color (hex)</label>
                    <select id="offerColor" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;box-sizing:border-box">
                        <option value="0xFFEF9F27">🟠 Orange (default)</option>
                        <option value="0xFFE53935">🔴 Red</option>
                        <option value="0xFF43A047">🟢 Green</option>
                        <option value="0xFF1E88E5">🔵 Blue</option>
                        <option value="0xFF8E24AA">🟣 Purple</option>
                        <option value="0xFFFFB300">🟡 Amber</option>
                    </select>
                </div>
            </div>

            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Discount % *</label>
                <input type="number" id="offerDiscount" placeholder="e.g., 20 for 20% off" min="1" max="100"
                    style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;box-sizing:border-box" />
            </div>

            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Expires At (optional — leave empty for no expiry)</label>
                <input type="datetime-local" id="offerExpiresAt"
                    style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;box-sizing:border-box" />
            </div>

            <div style="display:flex;gap:12px">
                <button class="btn" onclick="saveOffer()" style="flex:1">💾 Save Offer</button>
                <button class="btn ghost" onclick="closeOfferModal()" style="flex:1">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
(async function(){
  const token = localStorage.getItem('authToken') || '';
  let editingOfferId = null;

  /* ── helpers ───────────────────────────────────────────── */
  function fmtDate(iso){ return iso ? new Date(iso).toLocaleString() : '—'; }

  function colorLabel(hex){
    const map = {
      '0xFFEF9F27':'🟠 Orange','0xFFE53935':'🔴 Red','0xFF43A047':'🟢 Green',
      '0xFF1E88E5':'🔵 Blue','0xFF8E24AA':'🟣 Purple','0xFFFFB300':'🟡 Amber'
    };
    return map[hex] || hex;
  }

  /* ── load & render list ─────────────────────────────────── */
  async function loadOffers(){
    try{
      const res  = await fetch('/api/owner/offers', { headers: authHeader() });
      const data = await res.json();
      const root = document.getElementById('offersList');

      if(!Array.isArray(data) || !data.length){
        root.innerHTML = '<div class="muted">No offers created yet.</div>';
        return;
      }

      root.innerHTML = data.map(function(o){
        const isActive  = o.is_active;
        const createdAt = fmtDate(o.created_at);
        const expiresAt = o.expires_at ? fmtDate(o.expires_at) : 'No expiry';

        return `
          <div style="border:2px solid ${isActive ? '#22c55e' : '#e5e7eb'};border-radius:12px;padding:16px;margin-bottom:12px;background:${isActive ? '#f0fdf4' : '#f8fafc'}">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
              <div>
                <h3 style="margin:0;color:#111827">
                  ${o.emoji || '🎉'} ${o.title}
                  ${isActive ? '<span style="background:#22c55e;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;margin-left:8px">ACTIVE</span>' : ''}
                </h3>
                <div style="color:#64748b;margin-top:4px">${o.subtitle || '<em>No subtitle</em>'}</div>
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn" style="padding:6px 12px;font-size:14px" onclick="editOffer(${o.id})">✏️ Edit</button>
                <button class="btn" style="padding:6px 12px;font-size:14px;background:${isActive ? '#ef4444' : '#22c55e'}"
                    onclick="toggleOffer(${o.id}, ${!isActive})">${isActive ? 'Deactivate' : 'Activate'}</button>
                <button class="btn" style="padding:6px 12px;font-size:14px;background:#ef4444" onclick="deleteOffer(${o.id})">🗑 Delete</button>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;font-size:14px">
              <div><strong>Discount:</strong> ${o.discount_percent}%</div>
              <div><strong>Color:</strong> ${colorLabel(o.color)}</div>
              <div><strong>Created:</strong> ${createdAt}</div>
              <div><strong>Expires:</strong> ${expiresAt}</div>
            </div>
          </div>
        `;
      }).join('');

    }catch(e){
      document.getElementById('offersList').textContent = 'Failed to load offers.';
      console.error(e);
    }
  }

  /* ── auth header helper ─────────────────────────────────── */
  function authHeader(){
    return token ? { 'Authorization': 'Bearer ' + token } : {};
  }

  /* ── show create form ───────────────────────────────────── */
  window.showCreateOfferForm = function(){
    editingOfferId = null;
    document.getElementById('offerModalTitle').textContent = 'Create New Offer';
    document.getElementById('offerTitle').value      = '';
    document.getElementById('offerSubtitle').value   = '';
    document.getElementById('offerEmoji').value      = '🎉';
    document.getElementById('offerColor').value      = '0xFFEF9F27';
    document.getElementById('offerDiscount').value   = '';
    document.getElementById('offerExpiresAt').value  = '';
    document.getElementById('offerModal').style.display = 'flex';
  };

  window.closeOfferModal = function(){
    document.getElementById('offerModal').style.display = 'none';
  };

  /* ── save (create or update) ────────────────────────────── */
  window.saveOffer = async function(){
    const title         = document.getElementById('offerTitle').value.trim();
    const subtitle      = document.getElementById('offerSubtitle').value.trim();
    const emoji         = document.getElementById('offerEmoji').value.trim() || '🎉';
    const color         = document.getElementById('offerColor').value || '0xFFEF9F27';
    const discount      = parseFloat(document.getElementById('offerDiscount').value);
    const expiresAtRaw  = document.getElementById('offerExpiresAt').value;

    if(!title || !discount || discount <= 0){
      alert('Please fill in Offer Title and Discount %');
      return;
    }

    const payload = {
      title:            title,
      subtitle:         subtitle,
      emoji:            emoji,
      color:            color,
      discount_percent: discount,
      expires_at:       expiresAtRaw ? new Date(expiresAtRaw).toISOString() : null
    };

    try{
      let res;
      if(editingOfferId){
        res = await fetch('/api/owner/offers/' + editingOfferId, {
          method:  'PUT',
          headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()),
          body:    JSON.stringify(payload)
        });
      } else {
        res = await fetch('/api/owner/offers', {
          method:  'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()),
          body:    JSON.stringify(payload)
        });
      }

      if(res.ok){
        closeOfferModal();
        loadOffers();
        alert(editingOfferId ? 'Offer updated!' : 'Offer created and activated!');
      } else {
        const err = await res.json().catch(()=>({}));
        alert('Error: ' + (err.error || 'Failed to save offer'));
      }
    }catch(e){
      alert('Error saving offer: ' + e.message);
    }
  };

  /* ── edit — populate form from list ────────────────────── */
  window.editOffer = async function(id){
    editingOfferId = id;
    try{
      const res    = await fetch('/api/owner/offers', { headers: authHeader() });
      const offers = await res.json();
      const offer  = offers.find(function(o){ return o.id === id; });

      if(offer){
        document.getElementById('offerModalTitle').textContent = 'Edit Offer';
        document.getElementById('offerTitle').value     = offer.title    || '';
        document.getElementById('offerSubtitle').value  = offer.subtitle || '';
        document.getElementById('offerEmoji').value     = offer.emoji    || '🎉';
        document.getElementById('offerColor').value     = offer.color    || '0xFFEF9F27';
        document.getElementById('offerDiscount').value  = offer.discount_percent;
        if(offer.expires_at){
          document.getElementById('offerExpiresAt').value = new Date(offer.expires_at).toISOString().slice(0,16);
        } else {
          document.getElementById('offerExpiresAt').value = '';
        }
        document.getElementById('offerModal').style.display = 'flex';
      }
    }catch(e){
      alert('Error loading offer: ' + e.message);
    }
  };

  /* ── toggle active ──────────────────────────────────────── */
  window.toggleOffer = async function(id, activate){
    try{
      const res = await fetch('/api/owner/offers/' + id, {
        method:  'PUT',
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()),
        body:    JSON.stringify({ is_active: activate })
      });
      if(res.ok){
        loadOffers();
      } else {
        alert('Failed to update offer status');
      }
    }catch(e){
      alert('Error: ' + e.message);
    }
  };

  /* ── delete ─────────────────────────────────────────────── */
  window.deleteOffer = async function(id){
    if(!confirm('Are you sure you want to delete this offer?')) return;
    try{
      const res = await fetch('/api/owner/offers/' + id, {
        method:  'DELETE',
        headers: authHeader()
      });
      if(res.ok){
        loadOffers();
      } else {
        alert('Failed to delete offer');
      }
    }catch(e){
      alert('Error: ' + e.message);
    }
  };

  loadOffers();
})();
</script>
{% endblock %}
