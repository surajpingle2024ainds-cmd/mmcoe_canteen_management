{% extends 'base_owner.html' %}
{% block title %}Manage Combos{% endblock %}
{% block content %}
<div class="card">
    <h2 class="section-title">🍱 Manage Combos</h2>
    <div style="margin-bottom:20px">
        <button class="btn" onclick="showCreateComboForm()">➕ Create New Combo</button>
    </div>
    <div id="combosList">Loading...</div>
</div>

<!-- Create/Edit Combo Modal -->
<div id="comboModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center">
    <div style="background:#fff;padding:30px;border-radius:16px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto">
        <h3 style="margin-bottom:20px">Create Combo</h3>
        <div style="display:flex;flex-direction:column;gap:16px">
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Combo Name *</label>
                <input type="text" id="comboName" placeholder="e.g., Lunch Special" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Description</label>
                <textarea id="comboDescription" placeholder="Optional description" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;min-height:60px"></textarea>
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Price (₹) *</label>
                <input type="number" id="comboPrice" placeholder="e.g., 150" min="1" step="0.01" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Icon</label>
                <input type="text" id="comboIcon" placeholder="e.g., 🍱" maxlength="2" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Image</label>
                <input type="file" id="comboImage" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" onchange="handleComboImagePreview(event)" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px" />
                <div id="comboImagePreview" style="margin-top:10px;display:none">
                    <img id="comboPreviewImg" src="" alt="Preview" style="max-width:200px;max-height:200px;border-radius:8px;border:2px solid #e5e7eb">
                </div>
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Add Menu Items to Combo</label>
                <div id="comboItemsList" style="border:2px solid #e5e7eb;border-radius:8px;padding:12px;min-height:100px;max-height:300px;overflow-y:auto;background:#f8fafc">
                    <div class="muted">Loading menu items...</div>
                </div>
            </div>
            <div>
                <label style="display:block;margin-bottom:6px;font-weight:700">Selected Items</label>
                <div id="selectedItems" style="border:2px solid #e5e7eb;border-radius:8px;padding:12px;min-height:60px;background:#f0fdf4"></div>
            </div>
            <div style="display:flex;gap:12px">
                <button class="btn" onclick="saveCombo()" style="flex:1">Save</button>
                <button class="btn ghost" onclick="closeComboModal()" style="flex:1">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
(async function(){
  const token = localStorage.getItem('authToken') || '';
  let allMenuItems = [];
  let selectedItems = [];
  let editingComboId = null;
  
  async function loadMenuItems(){
    try{
      const res = await fetch('/api/menu/all');
      allMenuItems = await res.json();
      renderMenuItems();
    }catch(e){
      console.error(e);
    }
  }
  
  function renderMenuItems(){
    const root = document.getElementById('comboItemsList');
    if(!Array.isArray(allMenuItems) || !allMenuItems.length){
      root.innerHTML = '<div class="muted">No menu items available.</div>';
      return;
    }
    
    root.innerHTML = allMenuItems.map(function(item){
      const selected = selectedItems.find(function(s){ return s.menu_item_id === item.id; });
      const qty = selected ? selected.quantity : 0;
      
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #e5e7eb">
          <div>
            <span style="font-size:20px">${item.icon || '🍽️'}</span>
            <strong>${item.name}</strong>
            <span class="muted">₹${item.price}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="decreaseItem(${item.id})" style="padding:4px 10px;border:1px solid #e5e7eb;border-radius:4px;background:#fff;cursor:pointer">−</button>
            <span id="qty_${item.id}" style="min-width:30px;text-align:center;font-weight:700">${qty}</span>
            <button onclick="increaseItem(${item.id})" style="padding:4px 10px;border:1px solid #e5e7eb;border-radius:4px;background:#fff;cursor:pointer">+</button>
          </div>
        </div>
      `;
    }).join('');
  }
  
  function updateSelectedItems(){
    const root = document.getElementById('selectedItems');
    const items = selectedItems.filter(function(s){ return s.quantity > 0; });
    
    if(!items.length){
      root.innerHTML = '<div class="muted">No items selected. Click + to add items.</div>';
      return;
    }
    
    root.innerHTML = items.map(function(s){
      const item = allMenuItems.find(function(m){ return m.id === s.menu_item_id; });
      if(!item) return '';
      return `
        <div style="display:inline-block;background:#fff;padding:6px 12px;border-radius:6px;margin:4px;border:1px solid #22c55e">
          ${item.icon} ${item.name} x${s.quantity}
        </div>
      `;
    }).join('');
  }
  
  window.increaseItem = function(menuItemId){
    const existing = selectedItems.find(function(s){ return s.menu_item_id === menuItemId; });
    if(existing){
      existing.quantity++;
    } else {
      selectedItems.push({ menu_item_id: menuItemId, quantity: 1 });
    }
    renderMenuItems();
    updateSelectedItems();
  };
  
  window.decreaseItem = function(menuItemId){
    const existing = selectedItems.find(function(s){ return s.menu_item_id === menuItemId; });
    if(existing){
      existing.quantity--;
      if(existing.quantity <= 0){
        selectedItems = selectedItems.filter(function(s){ return s.menu_item_id !== menuItemId; });
      }
    }
    renderMenuItems();
    updateSelectedItems();
  };
  
  async function loadCombos(){
    try{
      const res = await fetch('/api/owner/combos', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
      const combos = await res.json();
      const root = document.getElementById('combosList');
      
      if(!Array.isArray(combos) || !combos.length){
        root.innerHTML = '<div class="muted">No combos created yet.</div>';
        return;
      }
      
      root.innerHTML = combos.map(function(c){
        return `
          <div style="border:2px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;background:${c.available ? '#f8fafc' : '#fef2f2'}">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
              <div>
                <h3 style="margin:0;color:#111827">${c.icon || '🍱'} ${c.name} ${!c.available ? '<span style="background:#ef4444;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;margin-left:8px">UNAVAILABLE</span>' : ''}</h3>
                <div style="color:#64748b;margin-top:4px">${c.description || 'No description'}</div>
                <div style="margin-top:8px;font-weight:700;color:#ef4444;font-size:18px">₹${c.price}</div>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn" style="padding:6px 12px;font-size:14px" onclick="editCombo(${c.id})">Edit</button>
                <button class="btn" style="padding:6px 12px;font-size:14px;background:${c.available ? '#ef4444' : '#22c55e'}" onclick="toggleCombo(${c.id}, ${!c.available})">${c.available ? 'Disable' : 'Enable'}</button>
                <button class="btn" style="padding:6px 12px;font-size:14px;background:#ef4444" onclick="deleteCombo(${c.id})">Delete</button>
              </div>
            </div>
            <div style="margin-top:12px">
              <strong>Items:</strong>
              <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
                ${c.items.map(function(i){ return `<span style="background:#e0e7ff;padding:4px 8px;border-radius:6px">${i.icon} ${i.name} x${i.quantity}</span>`; }).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }catch(e){
      document.getElementById('combosList').textContent = 'Failed to load combos.';
      console.error(e);
    }
  }
  
  window.showCreateComboForm = function(){
    editingComboId = null;
    selectedItems = [];
    document.getElementById('comboName').value = '';
    document.getElementById('comboDescription').value = '';
    document.getElementById('comboPrice').value = '';
    document.getElementById('comboIcon').value = '🍱';
    document.getElementById('comboImage').value = '';
    const preview = document.getElementById('comboImagePreview');
    if(preview) preview.style.display = 'none';
    loadMenuItems();
    updateSelectedItems();
    document.getElementById('comboModal').style.display = 'flex';
  };
  
  window.handleComboImagePreview = function(event){
    const file = event.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = function(e){
        const preview = document.getElementById('comboImagePreview');
        const previewImg = document.getElementById('comboPreviewImg');
        if(preview && previewImg){
          previewImg.src = e.target.result;
          preview.style.display = 'block';
        }
      };
      reader.readAsDataURL(file);
    }
  };
  
  window.closeComboModal = function(){
    document.getElementById('comboModal').style.display = 'none';
  };
  
  window.saveCombo = async function(){
    const name = document.getElementById('comboName').value.trim();
    const price = parseFloat(document.getElementById('comboPrice').value);
    const description = document.getElementById('comboDescription').value.trim();
    const icon = document.getElementById('comboIcon').value.trim() || '🍱';
    const imageFile = document.getElementById('comboImage').files[0];
    const items = selectedItems.filter(function(s){ return s.quantity > 0; });
    
    if(!name || !price || price <= 0 || !items.length){
      alert('Please fill in combo name, price, and add at least one item');
      return;
    }
    
    try{
      let imageUrl = '';
      
      // If editing and no new image selected, preserve existing image
      if(editingComboId && !imageFile){
        try{
          const res = await fetch('/api/owner/combos', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
          const combos = await res.json();
          const existingCombo = combos.find(function(c){ return c.id === editingComboId; });
          if(existingCombo && existingCombo.image_url){
            imageUrl = existingCombo.image_url;
          }
        }catch(e){}
      }
      
      // Upload new image if provided
      if(imageFile){
        const formData = new FormData();
        formData.append('file', imageFile);
        
        const uploadRes = await fetch('/api/upload/image', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token
          },
          body: formData
        });
        
        if(uploadRes.ok){
          const uploadData = await uploadRes.json();
          imageUrl = uploadData.image_url || '';
        } else {
          const error = await uploadRes.json().catch(() => ({error: 'Upload failed'}));
          alert('Image upload failed: ' + (error.error || 'Unknown error'));
          return;
        }
      }
      
      const data = {
        name: name,
        price: price,
        description: description,
        icon: icon,
        image_url: imageUrl,
        items: items,
        available: true
      };
      
      let res;
      if(editingComboId){
        res = await fetch('/api/owner/combos/' + editingComboId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
          body: JSON.stringify(data)
        });
      } else {
        res = await fetch('/api/owner/combos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
          body: JSON.stringify(data)
        });
      }
      
      if(res.ok){
        closeComboModal();
        loadCombos();
        alert('Combo saved successfully!');
      } else {
        const err = await res.json();
        alert('Error: ' + (err.error || 'Failed to save'));
      }
    }catch(e){
      alert('Error saving combo: ' + e.message);
    }
  };
  
  window.editCombo = async function(id){
    editingComboId = id;
    try{
      const res = await fetch('/api/owner/combos', { headers: { 'Authorization': token ? 'Bearer ' + token : '' } });
      const combos = await res.json();
      const combo = combos.find(function(c){ return c.id === id; });
      
      if(combo){
        document.getElementById('comboName').value = combo.name;
        document.getElementById('comboDescription').value = combo.description || '';
        document.getElementById('comboPrice').value = combo.price;
        document.getElementById('comboIcon').value = combo.icon || '🍱';
        document.getElementById('comboImage').value = '';
        selectedItems = combo.items.map(function(i){ return { menu_item_id: i.id, quantity: i.quantity }; });
        // Show existing image if available
        if(combo.image_url){
          const preview = document.getElementById('comboImagePreview');
          const previewImg = document.getElementById('comboPreviewImg');
          if(preview && previewImg){
            previewImg.src = combo.image_url;
            preview.style.display = 'block';
          }
        } else {
          const preview = document.getElementById('comboImagePreview');
          if(preview) preview.style.display = 'none';
        }
        loadMenuItems();
        updateSelectedItems();
        document.getElementById('comboModal').style.display = 'flex';
      }
    }catch(e){
      alert('Error loading combo: ' + e.message);
    }
  };
  
  window.toggleCombo = async function(id, available){
    try{
      const res = await fetch('/api/owner/combos/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
        body: JSON.stringify({ available: available })
      });
      
      if(res.ok){
        loadCombos();
      } else {
        alert('Failed to update combo');
      }
    }catch(e){
      alert('Error: ' + e.message);
    }
  };
  
  window.deleteCombo = async function(id){
    if(!confirm('Are you sure you want to delete this combo?')) return;
    
    try{
      const res = await fetch('/api/owner/combos/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': token ? 'Bearer ' + token : '' }
      });
      
      if(res.ok){
        loadCombos();
      } else {
        alert('Failed to delete combo');
      }
    }catch(e){
      alert('Error: ' + e.message);
    }
  };
  
  loadCombos();
})();
</script>
{% endblock %}
